spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/coachdb}
    username: ${DATABASE_USERNAME:coach}
    password: ${DATABASE_PASSWORD:coach}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.back.coach: DEBUG
    org.hibernate.SQL: DEBUG
