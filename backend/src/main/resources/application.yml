spring:
  application:
    name: coach-backend
  profiles:
    active: local
  threads:
    virtual:
      enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      timeout: 3s
  cache:
    type: redis

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_batch_fetch_size: 100

  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always

security:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:dev-jwt-secret-key-change-in-production-f8e7d6c5b4a39281706958473625140a}
    access-ttl-seconds: 900
    refresh-ttl-seconds: 86400
  cookie:
    secure: false
  oauth2:
    frontend-redirect-url: ${FRONTEND_URL:http://localhost:3000}

ai:
  gateway:
    api-key: ${AI_GATEWAY_API_KEY:}
    base-url: ${AI_GATEWAY_BASE_URL:http://localhost:0}
    model: ${AI_GATEWAY_MODEL:default}
    timeout:
      connect: 5s
      read: 120s
    retry:
      max-attempts: 1
  concurrency:
    max-concurrent-calls: 4
    queue-timeout-seconds: 180

github:
  api:
    base-url: ${GITHUB_API_BASE_URL:https://api.github.com}
