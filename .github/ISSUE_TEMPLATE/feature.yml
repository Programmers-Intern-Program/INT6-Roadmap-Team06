name: 기능 작업
description: 새 기능 개발 또는 기능 확장 작업을 등록합니다.
title: "[Feature] "
body:
  - type: textarea
    id: purpose
    attributes:
      label: 목적
      description: 이 작업이 필요한 이유와 해결하려는 문제를 적어주세요.
      placeholder: 예) dev 브랜치 기준으로 PR 검증 체계를 추가한다.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 작업 내용
      description: 구현하거나 변경할 내용을 구체적으로 적어주세요.
      placeholder: |
        - backend-ci GitHub Actions 추가
        - PR 템플릿 추가
    validations:
      required: true

  - type: textarea
    id: verification
    attributes:
      label: 완료 조건
      description: 완료 여부를 어떻게 확인할지 적어주세요.
      placeholder: 예) dev 대상 PR 생성 시 backend-ci가 자동 실행된다.
    validations:
      required: true
