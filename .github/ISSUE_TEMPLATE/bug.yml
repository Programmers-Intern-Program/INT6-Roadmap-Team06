name: 버그 수정
description: 재현 가능한 버그나 잘못된 동작을 등록합니다.
title: "[Bug] "
body:
  - type: textarea
    id: symptom
    attributes:
      label: 증상
      description: 어떤 문제가 발생했고 현재 실제로 어떻게 동작하는지 적어주세요.
      placeholder: 예) dev 대상 PR에서 backend-ci가 실행되지 않는다.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 재현 방법
      description: 가능한 한 구체적인 재현 절차를 적어주세요.
      placeholder: |
        1. feature 브랜치에서 PR 생성
        2. target branch를 dev로 선택
        3. Actions 탭 확인
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 결과
      description: 원래 기대한 동작을 적어주세요.
      placeholder: 예) backend-ci가 자동 실행되어야 한다.
    validations:
      required: true
