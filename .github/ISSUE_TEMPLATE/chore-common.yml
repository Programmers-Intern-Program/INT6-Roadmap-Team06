name: 공통 작업
description: 공통 기반, 운영 규칙, 설정 작업을 등록합니다.
title: "[Chore] "
body:
  - type: textarea
    id: purpose
    attributes:
      label: 목적
      description: 왜 이 공통 작업이 필요한지 적어주세요.
      placeholder: 예) dev/main 브랜치 전략에 맞는 운영 기준을 정리한다.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 작업 내용
      description: 구현하거나 변경할 내용을 적어주세요.
      placeholder: |
        - GitHub Actions 정리
        - PR 템플릿 단순화
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: 완료 조건
      description: 이 작업이 끝났다고 볼 수 있는 기준을 적어주세요.
      placeholder: |
        - dev 대상 PR에서 CI가 돈다
        - PR 템플릿이 자동 적용된다
    validations:
      required: true
