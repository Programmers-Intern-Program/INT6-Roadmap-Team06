name: CI

on:
  pull_request:
    branches:
      - dev
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - dev
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-ci:
    name: backend-ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Run backend tests with Jacoco
        run: ./gradlew test

      - name: Upload Jacoco HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-html-report
          path: backend/build/reports/jacoco/test/html
          if-no-files-found: warn

      - name: Upload Jacoco XML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-xml-report
          path: backend/build/reports/jacoco/test/jacocoTestReport.xml
          if-no-files-found: warn
