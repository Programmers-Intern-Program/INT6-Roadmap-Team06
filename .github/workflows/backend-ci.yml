name: backend-ci

on:
  pull_request:
    branches:
      - dev
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - dev
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-pr-check:
    name: backend-pr-check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Run PR backend verification
        run: ./gradlew --no-daemon prVerification

      - name: Upload PR integration test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pr-integration-test-report
          path: backend/build/reports/tests/prIntegrationTest
          if-no-files-found: warn

      - name: Upload Jacoco HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-html-report-pr
          path: backend/build/reports/jacoco/test/html
          if-no-files-found: warn

      - name: Upload Jacoco XML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-xml-report-pr
          path: backend/build/reports/jacoco/test/jacocoTestReport.xml
          if-no-files-found: warn

  backend-full-verification:
    name: backend-full-verification
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Run full backend verification
        run: ./gradlew --no-daemon fullVerification

      - name: Upload integration test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report-full
          path: backend/build/reports/tests/integrationTest
          if-no-files-found: warn

      - name: Upload Jacoco HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-html-report-full
          path: backend/build/reports/jacoco/test/html
          if-no-files-found: warn

      - name: Upload Jacoco XML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-xml-report-full
          path: backend/build/reports/jacoco/test/jacocoTestReport.xml
          if-no-files-found: warn
