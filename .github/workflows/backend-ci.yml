name: CI

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:
  backend-ci:
    name: backend-ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Run backend tests with Jacoco
        run: ./gradlew --no-daemon test jacocoTestReport

      - name: Upload Jacoco HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-html-report
          path: backend/build/reports/jacoco/test/html
          if-no-files-found: warn

      - name: Upload Jacoco XML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-xml-report
          path: backend/build/reports/jacoco/test/jacocoTestReport.xml
          if-no-files-found: warn
