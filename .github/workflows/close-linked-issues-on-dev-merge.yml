name: close-linked-issues-on-dev-merge

on:
  pull_request:
    types:
      - closed
    branches:
      - dev

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  close-linked-issues:
    name: close-linked-issues
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Close linked issues from PR body
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const prNumber = context.payload.pull_request.number;
            const keywordRegex = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)\b/gi;
            const shorthandLineRegex = /^\s*-\s*close.*?:\s*(.*)$/gim;

            const keywordIssueNumbers = [...body.matchAll(keywordRegex)].map(([, issueNumber]) => Number(issueNumber));
            const shorthandIssueNumbers = [...body.matchAll(shorthandLineRegex)]
              .flatMap(([, issueSection]) => [...issueSection.matchAll(/#(\d+)/g)].map(([, issueNumber]) => Number(issueNumber)));
            const uniqueIssueNumbers = [...new Set([...keywordIssueNumbers, ...shorthandIssueNumbers])];

            if (uniqueIssueNumbers.length === 0) {
              core.info("No linked issues found in PR body.");
              return;
            }

            for (const issue_number of uniqueIssueNumbers) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number,
                });

                if (issue.pull_request) {
                  core.info(`#${issue_number} is a pull request. Skipping.`);
                  continue;
                }

                if (issue.state === "closed") {
                  core.info(`#${issue_number} is already closed. Skipping.`);
                  continue;
                }

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number,
                  body: `PR #${prNumber}가 \`dev\` 브랜치에 머지되어 이 이슈를 자동 종료합니다.`,
                });

                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number,
                  state: "closed",
                  state_reason: "completed",
                });

                core.info(`#${issue_number} closed.`);
              } catch (error) {
                core.warning(`Failed to close issue #${issue_number}: ${error.message}`);
              }
            }
